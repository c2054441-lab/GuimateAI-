!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuimateAI 🇬🇳</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; color: white; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #0d2137; padding: 15px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1a7f5a; }
        .header h1 { font-size: 20px; color: white; }
        .header span { color: #25b87a; font-size: 13px; }
        .matiere-bar { background: #0d2137; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #ffffff10; }
        .matiere-btn { background: #1a7f5a30; border: 1px solid #1a7f5a50; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .matiere-btn.active { background: #1a7f5a; border-color: #1a7f5a; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user-msg { background: #1a7f5a; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: #0d2137; border: 1px solid #1a7f5a30; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        .input-bar { background: #0d2137; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #ffffff10; }
        .input-bar input { flex: 1; background: #ffffff10; border: none; color: white; padding: 12px 16px; border-radius: 25px; font-size: 14px; outline: none; }
        .input-bar input::placeholder { color: #ffffff50; }
        .send-btn { background: #1a7f5a; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        .typing { color: #25b87a; font-style: italic; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <div>🎓</div>
    <div>
        <h1>GuimateAI 🇬🇳</h1>
        <span id="matiere-active">Général</span>
    </div>
</div>

<div class="matiere-bar">
    <button class="matiere-btn active" onclick="setMatiere('Général')">🎓 Général</button>
    <button class="matiere-btn" onclick="setMatiere('Mathématiques')">📐 Maths</button>
    <button class="matiere-btn" onclick="setMatiere('Physique-Chimie')">⚗️ Physique</button>
    <button class="matiere-btn" onclick="setMatiere('Sciences de la vie')">🌿 SVT</button>
    <button class="matiere-btn" onclick="setMatiere('Histoire-Géographie')">🗺️ Histoire</button>
    <button class="matiere-btn" onclick="setMatiere('Français')">📖 Français</button>
</div>

<div class="messages" id="messages">
    <div class="message ai-msg">👋 Bonjour ! Je suis <strong>GuimateAI</strong>, ton tuteur scolaire 🇬🇳
Pose-moi n'importe quelle question et je t'expliquerai clairement ! ✅</div>
</div>

<div class="input-bar">
    <input type="text" id="input" placeholder="Pose ta question..." onkeypress="if(event.key==='Enter') envoyer()">
    <button class="send-btn" onclick="envoyer()">🚀</button>
</div>

<script>
    let matiere = 'Général';
    let historique = [];

    function setMatiere(m) {
        matiere = m;
        document.getElementById('matiere-active').textContent = m;
        document.querySelectorAll('.matiere-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function ajouterMessage(texte, isUser) {
        const div = document.createElement('div');
        div.className = 'message ' + (isUser ? 'user-msg' : 'ai-msg');
        div.textContent = texte;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 999999;
    }

    async function envoyer() {
        const input = document.getElementById('input');
        const message = input.value.trim();
        if (!message) return;
        
        input.value = '';
        ajouterMessage(message, true);
        historique.push({role: 'user', content: message});
        
        // Indicateur de frappe
        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.textContent = 'GuimateAI écrit...';
        typing.id = 'typing';
        document.getElementById('messages').appendChild(typing);
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message, matiere, historique})
            });
            const data = await response.json();
            
            document.getElementById('typing')?.remove();
            ajouterMessage(data.response, false);
            historique.push({role: 'assistant', content: data.response});
            
            if (historique.length > 20) historique = historique.slice(-20);
        } catch(e) {
            document.getElementById('typing')?.remove();
            ajouterMessage('❌ Erreur de connexion. Réessaie !', false);
        }
    }
</script>

</body>
</html>
