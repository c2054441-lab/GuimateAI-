!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuimateAI — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; color: white; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #1a7f5a, #25b87a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; box-shadow: 0 0 30px #1a7f5a50; }
        .logo h1 { font-size: 28px; font-weight: bold; }
        .logo p { color: #25b87a; font-size: 13px; margin-top: 5px; }
        .card { background: #0d2137; border: 1px solid #1a7f5a30; border-radius: 20px; padding: 30px 25px; width: 100%; max-width: 380px; }
        .card h2 { font-size: 20px; margin-bottom: 25px; text-align: center; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 12px; color: #ffffff80; margin-bottom: 6px; }
        .field input { width: 100%; background: #ffffff08; border: 1px solid #ffffff15; color: white; padding: 12px 15px; border-radius: 12px; font-size: 14px; outline: none; }
        .field input:focus { border-color: #1a7f5a; }
        .field input::placeholder { color: #ffffff40; }
        .btn-primary { width: 100%; background: linear-gradient(135deg, #1a7f5a, #25b87a); border: none; color: white; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .lien { text-align: center; margin-top: 20px; font-size: 13px; color: #ffffff60; }
        .lien a { color: #25b87a; text-decoration: none; }
        .msg { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; text-align: center; display: none; }
        .msg.err { background: #ff444420; border: 1px solid #ff4444; color: #ff4444; }
        .creator { text-align: center; margin-top: 25px; font-size: 10px; color: #ffffff30; }
    </style>
</head>
<body>

<div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>GuimateAI 🇬🇳</h1>
    <p>Le premier tuteur IA de Guinée</p>
</div>

<div class="card">
    <h2>Se connecter</h2>
    <div class="msg err" id="msg-err"></div>

    <div class="field">
        <label>📱 Numéro de téléphone</label>
        <input type="tel" id="telephone" placeholder="+224 6XX XXX XXX">
    </div>

    <div class="field">
        <label>🔒 Mot de passe</label>
        <input type="password" id="password" placeholder="Ton mot de passe" onkeypress="if(event.key==='Enter') connexion()">
    </div>

    <button class="btn-primary" onclick="connexion()">Se connecter 🚀</button>

    <div class="lien">
        Pas encore de compte ? <a href="/inscription">S'inscrire gratuitement</a>
    </div>
</div>

<div class="creator">
    Créé par Cheick Abdoul Yalany Kebé Mara — GuimateHK 🇬🇳
</div>

<script>
    async function connexion() {
        const telephone = document.getElementById('telephone').value.trim();
        const password = document.getElementById('password').value.trim();
        const msgEl = document.getElementById('msg-err');

        if (!telephone || !password) {
            msgEl.textContent = '⚠️ Remplis tous les champs !';
            msgEl.style.display = 'block';
            return;
        }

        try {
            const r = await fetch('/connexion', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telephone, password })
            });
            const data = await r.json();

            if (data.success) {
                window.location.href = '/';
            } else {
                msgEl.textContent = '❌ ' + data.message;
                msgEl.style.display = 'block';
            }
        } catch(e) {
            msgEl.textContent = '❌ Erreur de connexion !';
            msgEl.style.display = 'block';
        }
    }
</script>
</body>
</html>
