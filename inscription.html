<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuimateAI — Inscription</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; color: white; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #1a7f5a, #25b87a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 12px; box-shadow: 0 0 30px #1a7f5a50; }
        .logo h1 { font-size: 26px; font-weight: bold; }
        .logo p { color: #25b87a; font-size: 12px; margin-top: 4px; }
        .card { background: #0d2137; border: 1px solid #1a7f5a30; border-radius: 20px; padding: 25px 20px; width: 100%; max-width: 380px; }
        .card h2 { font-size: 18px; margin-bottom: 20px; text-align: center; }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; color: #ffffff80; margin-bottom: 5px; }
        .field input { width: 100%; background: #ffffff08; border: 1px solid #ffffff15; color: white; padding: 11px 14px; border-radius: 12px; font-size: 13px; outline: none; }
        .field input:focus { border-color: #1a7f5a; }
        .field input::placeholder { color: #ffffff40; }
        .btn-primary { width: 100%; background: linear-gradient(135deg, #1a7f5a, #25b87a); border: none; color: white; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .gratuit-badge { background: #1a7f5a20; border: 1px solid #1a7f5a40; border-radius: 10px; padding: 10px; margin-bottom: 18px; text-align: center; font-size: 12px; color: #25b87a; }
        .lien { text-align: center; margin-top: 18px; font-size: 12px; color: #ffffff60; }
        .lien a { color: #25b87a; text-decoration: none; }
        .msg { padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; text-align: center; display: none; }
        .msg.err { background: #ff444420; border: 1px solid #ff4444; color: #ff4444; }
        .msg.ok { background: #1a7f5a20; border: 1px solid #1a7f5a; color: #25b87a; }
        .creator { text-align: center; margin-top: 20px; font-size: 10px; color: #ffffff30; }
        .conditions { font-size: 10px; color: #ffffff40; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>

<div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>GuimateAI 🇬🇳</h1>
    <p>Le premier tuteur IA de Guinée</p>
</div>

<div class="card">
    <h2>Créer mon compte</h2>

    <div class="gratuit-badge">
        🎉 Gratuit — 15 questions par jour incluses !
    </div>

    <div class="msg err" id="msg-err"></div>
    <div class="msg ok" id="msg-ok"></div>

    <div class="field">
        <label>👤 Nom complet</label>
        <input type="text" id="nom" placeholder="Ton nom complet">
    </div>

    <div class="field">
        <label>📱 Numéro de téléphone</label>
        <input type="tel" id="telephone" placeholder="+224 6XX XXX XXX">
    </div>

    <div class="field">
        <label>🔒 Mot de passe</label>
        <input type="password" id="password" placeholder="Crée un mot de passe">
    </div>

    <div class="field">
        <label>🔒 Confirme le mot de passe</label>
        <input type="password" id="password2" placeholder="Répète le mot de passe" onkeypress="if(event.key==='Enter') inscrire()">
    </div>

    <button class="btn-primary" onclick="inscrire()">Créer mon compte 🚀</button>

    <div class="conditions">
        En vous inscrivant, vous acceptez nos conditions d'utilisation
    </div>

    <div class="lien">
        Déjà un compte ? <a href="/connexion">Se connecter</a>
    </div>
</div>

<div class="creator">
    Créé par Cheick Abdoul Yalany Kebé Mara — GuimateHK 🇬🇳
</div>

<script>
    async function inscrire() {
        const nom = document.getElementById('nom').value.trim();
        const telephone = document.getElementById('telephone').value.trim();
        const password = document.getElementById('password').value.trim();
        const password2 = document.getElementById('password2').value.trim();
        const errEl = document.getElementById('msg-err');
        const okEl = document.getElementById('msg-ok');

        errEl.style.display = 'none';
        okEl.style.display = 'none';

        // Validations
        if (!nom || !telephone || !password || !password2) {
            errEl.textContent = '⚠️ Remplis tous les champs !';
            errEl.style.display = 'block';
            return;
        }

        if (password !== password2) {
            errEl.textContent = '❌ Les mots de passe ne correspondent pas !';
            errEl.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errEl.textContent = '❌ Mot de passe trop court (minimum 6 caractères) !';
            errEl.style.display = 'block';
            return;
        }

        try {
            const r = await fetch('/inscription', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nom, telephone, password })
            });
            const data = await r.json();

            if (data.success) {
                okEl.textContent = '✅ Compte créé ! Redirection...';
                okEl.style.display = 'block';
                setTimeout(() => window.location.href = '/', 1500);
            } else {
                errEl.textContent = '❌ ' + data.message;
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = '❌ Erreur ! Réessaie.';
            errEl.style.display = 'block';
        }
    }
</script>
</body>
</html>
